<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHC Contact Intelligence — Recess</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0A0F1A; color:#E2E8F0; min-height:100vh; }
  .header { background:linear-gradient(135deg,#0D1525 0%,#1A2540 100%); padding:32px 40px; border-bottom:3px solid #14B9D6; }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .logo { font-size:28px; font-weight:800; color:#14B9D6; letter-spacing:-0.5px; }
  .logo span { color:#1FBBA6; }
  .header h1 { font-size:22px; font-weight:600; color:#fff; }
  .header p { font-size:13px; color:#94A3B8; margin-top:4px; }
  .stats-bar { display:flex; gap:16px; padding:20px 40px; background:#0D1525; border-bottom:1px solid #1E293B; flex-wrap:wrap; }
  .stat { background:#1A2540; border-radius:10px; padding:14px 20px; min-width:120px; text-align:center; border:1px solid #2D3A54; }
  .stat .num { font-size:26px; font-weight:700; color:#14B9D6; }
  .stat .label { font-size:11px; color:#94A3B8; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
  .stat.hot .num { color:#DC2626; }
  .stat.warm .num { color:#FF8900; }
  .stat.won .num { color:#1FBBA6; }
  .filters { padding:16px 40px; display:flex; gap:8px; flex-wrap:wrap; background:#0A0F1A; border-bottom:1px solid #1E293B; align-items:center; }
  .filters label { font-size:11px; color:#94A3B8; text-transform:uppercase; letter-spacing:0.5px; margin-right:8px; }
  .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid #2D3A54; background:transparent; color:#94A3B8; font-size:12px; cursor:pointer; transition:all 0.2s; font-family:'Inter',sans-serif; }
  .filter-btn:hover { border-color:#14B9D6; color:#14B9D6; }
  .filter-btn.active { background:#14B9D6; color:#0A0F1A; border-color:#14B9D6; font-weight:600; }
  .filter-btn.eng { border-color:#FF8900; }
  .filter-btn.eng.active { background:#FF8900; border-color:#FF8900; }
  .divider { width:1px; height:24px; background:#2D3A54; margin:0 8px; }
  .content { padding:24px 40px; }
  .tier-section { margin-bottom:28px; }
  .tier-header { font-size:15px; font-weight:700; color:#6C3FC5; margin-bottom:12px; padding:8px 16px; background:#1A2540; border-radius:8px; border-left:4px solid #6C3FC5; display:flex; justify-content:space-between; align-items:center; }
  .tier-header .count { background:#6C3FC5; color:#fff; border-radius:12px; padding:2px 10px; font-size:12px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:12px; }
  .card { background:#0D1525; border-radius:10px; padding:14px 16px; border:1px solid #2D3A54; position:relative; transition:all 0.2s; cursor:default; }
  .card:hover { border-color:#14B9D6; transform:translateY(-1px); box-shadow:0 4px 12px rgba(20,185,214,0.1); }
  .eng-bar { position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:10px 0 0 10px; }
  .eng-bar.hot { background:#DC2626; }
  .eng-bar.warm { background:#FF8900; }
  .eng-bar.cool { background:#3B82F6; }
  .eng-bar.cold { background:#475569; }
  .card-name { font-size:14px; font-weight:600; color:#F1F5F9; margin-left:8px; }
  .card-title { font-size:12px; color:#94A3B8; margin:4px 0 0 8px; line-height:1.4; }
  .card-meta { display:flex; gap:8px; margin:8px 0 0 8px; flex-wrap:wrap; align-items:center; }
  .badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
  .badge.status { border:1px solid #2D3A54; color:#94A3B8; }
  .badge.closed-won { background:#1FBBA6; color:#0A0F1A; }
  .badge.connected { background:#14B9D6; color:#0A0F1A; }
  .badge.sql { background:#FF8900; color:#0A0F1A; }
  .badge.nurture { background:#6C3FC5; color:#fff; }
  .badge.brand { border:1px solid #6C3FC5; color:#A78BFA; }
  .champion-badge { background:linear-gradient(135deg,#F59E0B,#D97706); color:#0A0F1A; font-size:10px; padding:2px 8px; border-radius:10px; font-weight:700; }
  .card-activity { font-size:11px; color:#64748B; margin:6px 0 0 8px; }
  .gaps-section { margin-top:36px; padding:24px; background:#1A2540; border-radius:12px; border:1px solid #2D3A54; }
  .gaps-section h3 { font-size:16px; font-weight:700; color:#DC2626; margin-bottom:16px; }
  .gap-item { padding:10px 16px; background:#0D1525; border-radius:8px; margin-bottom:8px; border-left:3px solid #DC2626; font-size:13px; color:#CBD5E1; }
  .gap-item strong { color:#FF8900; }
  .moves-section { margin-top:24px; padding:24px; background:#1A2540; border-radius:12px; border:1px solid #2D3A54; }
  .moves-section h3 { font-size:16px; font-weight:700; color:#1FBBA6; margin-bottom:16px; }
  .move-item { padding:10px 16px; background:#0D1525; border-radius:8px; margin-bottom:8px; border-left:3px solid #1FBBA6; font-size:13px; color:#CBD5E1; display:flex; gap:10px; align-items:flex-start; }
  .move-badge { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:700; white-space:nowrap; flex-shrink:0; }
  .move-badge.now { background:#DC2626; color:#fff; }
  .move-badge.week { background:#FF8900; color:#0A0F1A; }
  .move-badge.next { background:#14B9D6; color:#0A0F1A; }
  .move-badge.ongoing { background:#6C3FC5; color:#fff; }
  .legend { display:flex; gap:16px; padding:16px 40px; border-top:1px solid #1E293B; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:#94A3B8; }
  .legend-dot { width:12px; height:12px; border-radius:3px; }
  .search-box { padding:8px 40px 0; }
  .search-box input { width:100%; max-width:400px; padding:8px 14px; border-radius:8px; border:1px solid #2D3A54; background:#1A2540; color:#E2E8F0; font-size:13px; font-family:'Inter',sans-serif; outline:none; }
  .search-box input:focus { border-color:#14B9D6; }
  .search-box input::placeholder { color:#64748B; }
</style>
</head>

const tierOrder = ["C-Suite", "VP+", "Head / Sr Director", "Director", "Associate Director", "Sr Manager / Sr BM", "Manager / BM", "Lead", "Associate BM", "Analyst", "Other", "Unknown"];
function getStatusBadgeClass(s) {
  if (s==='Closed Won') return 'closed-won';
  if (s==='Connected') return 'connected';
  if (s==='Sales Qualified Lead') return 'sql';
  if (s==='Nurture for Later') return 'nurture';
  return 'status';
}
function renderStats() {
  const bar=document.getElementById('statsBar');
  const t=contacts.length, hot=contacts.filter(c=>c.engagement==='hot').length,
    warm=contacts.filter(c=>c.engagement==='warm').length,
    won=contacts.filter(c=>c.status==='Closed Won').length,
    conn=contacts.filter(c=>c.status==='Connected').length,
    sql=contacts.filter(c=>c.status==='Sales Qualified Lead').length,
    vp=contacts.filter(c=>['C-Suite','VP+'].includes(c.tier)).length,
    heads=contacts.filter(c=>c.tier==='Head / Sr Director').length;
  bar.innerHTML=`
    <div class="stat"><div class="num">${t}</div><div class="label">Total Contacts</div></div>
    <div class="stat won"><div class="num">${won}</div><div class="label">Closed Won</div></div>
    <div class="stat"><div class="num" style="color:#14B9D6">${conn}</div><div class="label">Connected</div></div>
    <div class="stat"><div class="num" style="color:#FF8900">${sql}</div><div class="label">SQLs</div></div>
    <div class="stat hot"><div class="num">${hot}</div><div class="label">Hot</div></div>
    <div class="stat warm"><div class="num">${warm}</div><div class="label">Warm</div></div>
    <div class="stat"><div class="num" style="color:#6C3FC5">${vp}</div><div class="label">C-Suite / VP+</div></div>
    <div class="stat"><div class="num" style="color:#6C3FC5">${heads}</div><div class="label">Heads / Sr Dir</div></div>`;
}
function renderContacts(filter,search) {
  const content=document.getElementById('content');
  let html='';
  tierOrder.forEach(tier => {
    let tc=contacts.filter(c=>c.tier===tier);
    if(filter==='champions') tc=tc.filter(c=>c.champion);
    else if(filter==='hot') tc=tc.filter(c=>c.engagement==='hot');
    else if(filter==='warm') tc=tc.filter(c=>c.engagement==='warm');
    else if(filter.startsWith('brand:')) { const b=filter.replace('brand:',''); tc=tc.filter(c=>c.brands.includes(b)); }
    if(search) { const s=search.toLowerCase(); tc=tc.filter(c=>c.name.toLowerCase().includes(s)||c.title.toLowerCase().includes(s)||c.brands.some(b=>b.toLowerCase().includes(s))); }
    if(tc.length===0) return;
    html+=`<div class="tier-section"><div class="tier-header"><span>${tier}</span><span class="count">${tc.length}</span></div><div class="cards">`;
    tc.forEach(c => {
      const bb=c.brands.map(b=>`<span class="badge brand">${b}</span>`).join('');
      const sc=getStatusBadgeClass(c.status);
      const ch=c.champion?`<span class="champion-badge">CHAMPION</span>`:'';
      html+=`<div class="card"><div class="eng-bar ${c.engagement}"></div><div class="card-name">${c.name} ${ch}</div><div class="card-title">${c.title}</div><div class="card-meta"><span class="badge ${sc}">${c.status}</span>${bb}</div><div class="card-activity">${c.lastActivity?'Last active: '+c.lastActivity:'No activity recorded'} · ${c.owner}</div></div>`;
    });
    html+=`</div></div>`;
